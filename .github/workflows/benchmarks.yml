name: Benchmarks

# The benchmark relies on competing watchers being installed on the runner, so
# it is only meaningful when triggered manually or after a release where we
# have control over the environment.
on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: flash-watcher --bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install competing watchers
        run: |
          sudo apt-get update
          sudo apt-get install -y entr
          cargo install --locked cargo-watch watchexec-cli

      - name: Build flash-watcher
        run: cargo build --release

      - name: Run bench
        run: ./target/release/flash-watcher --bench | tee bench-output.txt

      - name: Upload bench output
        uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: bench-output.txt
          retention-days: 30
